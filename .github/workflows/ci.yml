name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShelfAware.slnx

      - name: Build
        run: dotnet build ShelfAware.slnx --configuration Release --no-restore

      # Both unit-test projects run in CI: the pure engine tests, and the AI-layer
      # tests that drive the tool loop / extractor retry through a faked IChatClient
      # (no key). Only the extraction eval harness (tests/ShelfAware.Evals) needs a
      # live API key and is run manually.
      - name: Test — engine
        run: dotnet test tests/ShelfAware.Tests/ShelfAware.Tests.csproj --configuration Release --no-build

      - name: Test — AI layer (faked client)
        run: dotnet test tests/ShelfAware.Llm.Tests/ShelfAware.Llm.Tests.csproj --configuration Release --no-build

      - name: Test — persistence (in-memory SQLite)
        run: dotnet test tests/ShelfAware.Web.Tests/ShelfAware.Web.Tests.csproj --configuration Release --no-build
